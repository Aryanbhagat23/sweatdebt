name: Build and Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sweatdebt-repo/sweatdebt:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sweatdebt-repo/sweatdebt:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sweatdebt \
            --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sweatdebt-repo/sweatdebt:${{ github.sha }} \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --port 8080
