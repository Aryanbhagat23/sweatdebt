<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />

    <!-- CRITICAL for Android touch to work correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Android Chrome theme -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="background-color" content="#0a0a0f" />

    <!-- Prevent Android from doing weird tap delays -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SweatDebt" />

    <!-- Prevent phone number / email auto-detection messing with UI -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>SweatDebt</title>

    <!-- Prevent 300ms tap delay on ALL Android browsers -->
    <style>
      * { touch-action: manipulation; }
      html, body { overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
